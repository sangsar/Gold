<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دنیای سریال | Donyay Serial</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Quicksand:wght@400;600;700&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff99c8;
            --purple: #7209b7;
            --light-gray: #f8f9fa;
            --dark-bg: #10002b;
            --card-bg: rgba(20, 10, 40, 0.85);
            --text: #e0d6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #2a0a4a 0%, #10002b 100%);
            font-family: 'Vazirmatn', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== پس‌زمینه: ابر و ستاره (فقط این بخش تغییر کرده) ========== */
        .sky-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        /* ستاره‌های پنج‌پر */
        .star {
            position: absolute;
            background: #fff;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }
        /* ابرهای سفید (شبیه ابر انیمیشنی) */
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            animation: floatCloud 20s linear infinite;
        }
        .cloud::before, .cloud::after {
            content: "";
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .cloud::before {
            width: 60%; height: 80%;
            top: -40%; left: 10%;
        }
        .cloud::after {
            width: 50%; height: 70%;
            top: -25%; right: 10%;
        }
        @keyframes floatCloud {
            0% { transform: translateX(0) translateY(0); opacity: 0.8; }
            100% { transform: translateX(calc(100vw + 200px)) translateY(-30px); opacity: 0.4; }
        }

        /* ========== داشبورد (بدون تغییر) ========== */
        .dashboard {
            position: relative; z-index: 1;
            max-width: 1000px; width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0 100px;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .card:hover { border-color: var(--pink); box-shadow: 0 0 25px rgba(255,153,200,0.3); transform: translateY(-3px); }

        /* ========== لوگوها در مربع بزرگ (فقط این بخش تغییر کرده) ========== */
        .logo-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255,153,200,0.4);
            border-radius: 30px;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            box-shadow: 0 0 30px rgba(255,153,200,0.15);
        }
        .logo-panel .logo-btn {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 18px 28px;
            font-family: 'Creepster', cursive;
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 12px rgba(0,0,0,0.6);
            letter-spacing: 1px;
            line-height: 1.3;
            text-decoration: none;
            text-align: center;
            transition: all 0.25s;
            cursor: pointer;
            flex: 1;
            max-width: 200px;
        }
        .logo-panel .logo-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--pink);
            box-shadow: 0 0 25px rgba(255,153,200,0.4);
            transform: scale(1.04);
        }
        .logo-panel .logo-btn:first-child {
            color: var(--pink);
        }

        /* ========== سایر کارت‌ها (بدون تغییر) ========== */
        .date-widget {
            background: linear-gradient(135deg, rgba(114,9,183,0.3) 0%, rgba(20,10,40,0.9) 100%);
            border-radius: 24px; padding: 20px; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .day-number { font-size: 3.5rem; font-weight: 700; color: #fff; text-shadow: 0 0 15px var(--pink); line-height: 1; }
        .day-detail { font-size: 0.9rem; color: var(--pink); margin-top: 5px; font-weight: 600; }
        .quote-card { border-right: 4px solid var(--purple); padding-right: 15px; }
        .quote-text { font-family: 'Quicksand', sans-serif; font-size: 0.9rem; line-height: 1.8; color: #fff; margin-bottom: 5px; font-weight: 500; }
        .quote-fa { font-family: 'Vazirmatn', sans-serif; font-size: 0.8rem; line-height: 1.7; color: var(--light-gray); margin-bottom: 5px; }
        .quote-separator { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); margin: 8px 0; }
        .quote-author { color: var(--pink); font-size: 0.8rem; text-align: left; }

        /* دکمه‌های شناور */
        .floating-btn {
            position: fixed; z-index: 999;
            width: 50px; height: 50px; border-radius: 50%;
            border: none; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }
        .floating-btn:hover { transform: scale(1.1); }

        .player-float {
            bottom: 30px; right: 30px;
            background: transparent;
            animation: spinVinyl 3s linear infinite;
        }
        .player-float svg {
            width: 50px; height: 50px;
            filter: drop-shadow(0 0 12px rgba(255,153,200,0.6));
        }
        @keyframes spinVinyl { 100% { transform: rotate(360deg); } }
        .player-float:hover { animation-play-state: paused; }

        .pomodorro-float {
            bottom: 30px; left: 30px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c1121f);
            border: 2px solid #fff;
            font-size: 1.6rem;
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* مدال پومودورو */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 2000; display: none; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(20, 10, 40, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
            padding: 25px; max-width: 400px; width: 90%;
            max-height: 80vh; overflow-y: auto; color: #fff;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        #pomodorroModal .modal-content {
            text-align: center; max-width: 100vw; max-height: 100vh;
            border-radius: 30px; width: 90%; height: auto;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .timer-ring { position: relative; width: 200px; height: 200px; margin: 20px auto; }
        .timer-ring svg { transform: rotate(-90deg); }
        .ring-bg { stroke: rgba(255,255,255,0.08); stroke-width: 4; }
        .ring-fill { stroke: var(--pink); stroke-width: 4; stroke-dasharray: 6 10; stroke-linecap: round; }
        .tomato-emoji { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4.5rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }
        .timer-display { font-family: 'Quicksand', sans-serif; font-size: 2rem; text-align: center; color: var(--pink); }
        .btn-row { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .btn { padding: 10px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn-glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-glass:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 20px rgba(255,153,200,0.4); transform: translateY(-2px); }
        .btn-close { background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); color: #fff; margin-top: 15px; border-radius: 25px; }
        .btn-close:hover { background: rgba(255,255,255,0.15); }
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .logo-panel { flex-direction: column; gap: 15px; }
            .logo-panel .logo-btn { max-width: 100%; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <!-- پس‌زمینهٔ ابر و ستاره -->
    <div class="sky-bg" id="skyBg"></div>

    <div class="dashboard">
        <!-- لوگوها در مربع بزرگ -->
        <div class="card" style="background: transparent; border: none; box-shadow: none; backdrop-filter: none; padding: 0;">
            <div class="logo-panel">
                <a href="https://serialblog1.top/" target="_blank" class="logo-btn">DONYAY<br>SERIAL</a>
                <a href="https://www.nilfgaard.top/" target="_blank" class="logo-btn">BIA 2<br>MOVE</a>
            </div>
        </div>

        <!-- سایر بخش‌ها (بدون تغییر) -->
        <div class="card date-widget">
            <div class="day-number" id="todayDay">۱۵</div>
            <div class="day-detail" id="todayDetail">چهارشنبه، اردیبهشت ۱۴۰۴</div>
        </div>
        <div class="card quote-card">
            <div class="quote-text" id="motivEn"></div><div class="quote-separator"></div>
            <div class="quote-fa" id="motivFa"></div><div class="quote-author" id="motivAuthor"></div>
        </div>
        <div class="card quote-card">
            <div class="quote-text" id="bookEn"></div><div class="quote-separator"></div>
            <div class="quote-fa" id="bookFa"></div><div class="quote-author" id="bookAuthor"></div>
        </div>
    </div>

    <a href="https://sangsar.github.io/" target="_blank" class="floating-btn player-float" title="موسیقی Samisaki">
        <svg viewBox="0 0 100 100">
            <defs>
                <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#333"/><stop offset="15%" stop-color="#111"/><stop offset="30%" stop-color="#222"/><stop offset="45%" stop-color="#0a0a0a"/><stop offset="70%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#000"/>
                </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill="url(#vinylGrad)" stroke="#444" stroke-width="1"/>

            <circle cx="50" cy="50" r="15" fill="none" stroke="#333" stroke-width="1"/>
            <circle cx="50" cy="50" r="12" fill="#e0b1ff" stroke="#7209b7" stroke-width="2"/>
            <circle cx="50" cy="50" r="4" fill="#333"/>
            <ellipse cx="35" cy="30" rx="18" ry="8" fill="rgba(255,255,255,0.04)" transform="rotate(-35 35 30)"/>
        </svg>
    </a>

    <button class="floating-btn pomodorro-float" id="pomodorroFloatBtn" title="تایمر پومودورو">🍅</button>

    <div class="modal" id="pomodorroModal">
        <div class="modal-content">
            <h2>🍅 پومودورو</h2>
            <div class="timer-ring">
                <svg width="200" height="200" viewBox="0 0 220 220">
                    <circle class="ring-bg" cx="110" cy="110" r="100" />
                    <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="100" />
                </svg>
                <div class="tomato-emoji">🍅</div>
            </div>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="btn-row">
                <button class="btn btn-glass" id="startPom">شروع</button>
                <button class="btn btn-glass" id="resetPom">بازنشانی</button>
            </div>
            <button class="btn btn-close" id="closePom">بستن</button>
        </div>
    </div>

    <script>
        // ========== ۳۰ جمله انگیزشی ==========
        const motivQuotes = [
            { en: "The only way to do great work is to love what you do.", fa: "تنها راه انجام کار بزرگ، عشق ورزیدن به آن است.", author: "Steve Jobs" },
            { en: "I have not failed. I've just found 10,000 ways that won't work.", fa: "من شکست نخورده‌ام. فقط ۱۰,۰۰۰ راه پیدا کرده‌ام که کار نمی‌کند.", author: "Thomas Edison" },
            { en: "Success is not final, failure is not fatal: It is the courage to continue that counts.", fa: "موفقیت نهایی نیست، شکست کشنده نیست: شجاعت ادامه دادن مهم است.", author: "Winston Churchill" },
            { en: "Your time is limited, don't waste it living someone else's life.", fa: "زمان تو محدود است، آن را با زندگی کردن به روش دیگران هدر نده.", author: "Steve Jobs" },
            { en: "The future belongs to those who believe in the beauty of their dreams.", fa: "آینده متعلق به کسانی است که به زیبایی رویاهایشان ایمان دارند.", author: "Eleanor Roosevelt" },
            { en: "It does not matter how slowly you go as long as you do not stop.", fa: "مهم نیست چقدر آهسته می‌روی، تا زمانی که متوقف نشوی.", author: "Confucius" },
            { en: "Everything you can imagine is real.", fa: "هر چیزی که بتوانی تصور کنی، واقعی است.", author: "Pablo Picasso" },
            { en: "The purpose of our lives is to be happy.", fa: "هدف زندگی ما شاد بودن است.", author: "Dalai Lama" },
            { en: "Get busy living or get busy dying.", fa: "یا مشغول زندگی کردن باش، یا مشغول مردن.", author: "Stephen King" },
            { en: "You miss 100% of the shots you don't take.", fa: "۱۰۰٪ شوت‌هایی که نمی‌زنی را از دست می‌دهی.", author: "Wayne Gretzky" },
            { en: "In the middle of difficulty lies opportunity.", fa: "در میان سختی‌ها فرصت نهفته است.", author: "Albert Einstein" },
            { en: "The best time to plant a tree was 20 years ago. The second best time is now.", fa: "بهترین زمان کاشتن درخت ۲۰ سال پیش بود. دومین زمان اکنون است.", author: "Chinese Proverb" },
            { en: "Do what you can, with what you have, where you are.", fa: "با آنچه داری، در جایی که هستی، هر کاری می‌توانی بکن.", author: "Theodore Roosevelt" },
            { en: "Believe you can and you're halfway there.", fa: "باور کن که می‌توانی، نصف راه را رفته‌ای.", author: "Theodore Roosevelt" },
            { en: "Act as if what you do makes a difference. It does.", fa: "طوری عمل کن که انگار کارت تفاوتی ایجاد می‌کند. همین‌طور است.", author: "William James" },
            { en: "The only limit to our realization of tomorrow is our doubts of today.", fa: "تنها محدودیت تحقق فردا، تردیدهای امروز ماست.", author: "Franklin D. Roosevelt" },
            { en: "Creativity is intelligence having fun.", fa: "خلاقیت، هوشی است که سرگرم می‌شود.", author: "Albert Einstein" },
            { en: "What we think, we become.", fa: "ما همان می‌شویم که فکر می‌کنیم.", author: "Buddha" },
            { en: "The only way to discover the limits of the possible is to go beyond them into the impossible.", fa: "تنها راه کشف محدودیت‌های ممکن، رفتن به فراسوی آن به ناممکن است.", author: "Arthur C. Clarke" },
            { en: "Do not wait to strike till the iron is hot; but make it hot by striking.", fa: "منتظر نمان تا آهن داغ شود؛ با ضربه زدن آن را داغ کن.", author: "William Butler Yeats" },
            { en: "Whether you think you can or you think you can't, you're right.", fa: "چه فکر کنی می‌توانی چه فکر کنی نمی‌توانی، در هر دو حالت حق با توست.", author: "Henry Ford" },
            { en: "The only person you are destined to become is the person you decide to be.", fa: "تنها کسی که مقدر شده‌ای بشوی، کسی است که تصمیم می‌گیری باشی.", author: "Ralph Waldo Emerson" },
            { en: "Everything you’ve ever wanted is on the other side of fear.", fa: "هر چیزی که تا به حال خواسته‌ای، آن سوی ترس است.", author: "George Addair" },
            { en: "The question isn't who is going to let me; it's who is going to stop me.", fa: "سوال این نیست که چه کسی اجازه می‌دهد؛ سوال این است که چه کسی جلوی من را می‌گیرد.", author: "Ayn Rand" },
            { en: "Don’t count the days, make the days count.", fa: "روزها را نشمار، کاری کن که روزها ارزش شمردن داشته باشند.", author: "Muhammad Ali" },
            { en: "Life is what happens when you're busy making other plans.", fa: "زندگی آن چیزی است که وقتی مشغول برنامه‌ریزی‌های دیگر هستی، اتفاق می‌افتد.", author: "John Lennon" },
            { en: "The greatest glory in living lies not in never falling, but in rising every time we fall.", fa: "بزرگترین افتخار زندگی در هرگز نیفتادن نیست، بلکه در برخاستن هر بار پس از افتادن است.", author: "Nelson Mandela" },
            { en: "In three words I can sum up everything I've learned about life: it goes on.", fa: "در سه کلمه می‌توانم تمام آنچه از زندگی آموخته‌ام را خلاصه کنم: زندگی ادامه دارد.", author: "Robert Frost" },
            { en: "The way to get started is to quit talking and begin doing.", fa: "راه شروع، دست کشیدن از حرف زدن و آغاز کردن است.", author: "Walt Disney" },
            { en: "Your life does not get better by chance, it gets better by change.", fa: "زندگی‌ات با شانس بهتر نمی‌شود، با تغییر بهتر می‌شود.", author: "Jim Rohn" }
        ];

        // ========== ۳۰ جمله از کتاب‌ها ==========
        const bookQuotes = [
            { en: "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.", fa: "این حقیقتی است همگانی که یک مرد مجرد با ثروتی کلان، نیازمند یک همسر است.", author: "Jane Austen, Pride and Prejudice" },
            { en: "All happy families are alike; each unhappy family is unhappy in its own way.", fa: "همه خانواده‌های خوشبخت شبیه هم هستند؛ هر خانواده ناخوشبختی به شیوه خودش ناخوشبخت است.", author: "Leo Tolstoy, Anna Karenina" },
            { en: "It was the best of times, it was the worst of times.", fa: "بهترین دوران بود، بدترین دوران بود.", author: "Charles Dickens, A Tale of Two Cities" },
            { en: "Whatever our souls are made of, his and mine are the same.", fa: "هرچه روح ما از آن ساخته شده باشد، روح او و من یکی است.", author: "Emily Brontë, Wuthering Heights" },
            { en: "So we beat on, boats against the current, borne back ceaselessly into the past.", fa: "پس پیش می‌رویم، قایق‌ها بر خلاف جریان، پیوسته به گذشته بازگردانده می‌شویم.", author: "F. Scott Fitzgerald, The Great Gatsby" },
            { en: "Not all those who wander are lost.", fa: "همه آنان که سرگردانند، گم نشده‌اند.", author: "J.R.R. Tolkien, The Lord of the Rings" },
            { en: "It is only with the heart that one can see rightly; what is essential is invisible to the eye.", fa: "فقط با قلب است که می‌توان درست دید؛ آنچه ضروری است با چشم دیده نمی‌شود.", author: "Antoine de Saint-Exupéry, The Little Prince" },
            { en: "There is no greater agony than bearing an untold story inside you.", fa: "هیچ رنجی بزرگ‌تر از حمل یک داستان ناگفته در درونت نیست.", author: "Maya Angelou, I Know Why the Caged Bird Sings" },
            { en: "Stay gold, Ponyboy. Stay gold.", fa: "طلایی بمان، پونی‌بوی. طلایی بمان.", author: "S.E. Hinton, The Outsiders" },
            { en: "It was love at first sight, at last sight, at ever and ever sight.", fa: "این عشق در نگاه اول بود، در آخرین نگاه، در همیشه و همیشه نگاه.", author: "Vladimir Nabokov, Lolita" },
            { en: "The only thing we have to fear is fear itself.", fa: "تنها چیزی که باید از آن بترسیم، خود ترس است.", author: "Franklin D. Roosevelt" },

        // تقویم
        function updateDate() {
            const now = new Date();
            try {
                const pDay = now.toLocaleDateString('fa-IR', { day: 'numeric', calendar: 'persian' });
                const pWeekday = now.toLocaleDateString('fa-IR', { weekday: 'long' });
                const pMonth = now.toLocaleDateString('fa-IR', { month: 'long', calendar: 'persian' });
                const pYear = now.toLocaleDateString('fa-IR', { year: 'numeric', calendar: 'persian' });
                document.getElementById('todayDay').textContent = pDay;
                document.getElementById('todayDetail').textContent = `${pWeekday}، ${pMonth} ${pYear}`;
            } catch(e) {
                document.getElementById('todayDay').textContent = now.getDate();
                document.getElementById('todayDetail').textContent = now.toLocaleDateString('fa-IR');
            }
        }
        updateDate(); setInterval(updateDate, 60000);

        // جملات
        function updateQuotes() {
            const m = motivQuotes[Math.floor(Math.random() * motivQuotes.length)];
            document.getElementById('motivEn').textContent = `"${m.en}"`;
            document.getElementById('motivFa').textContent = m.fa;
            document.getElementById('motivAuthor').textContent = `— ${m.author}`;
            const b = bookQuotes[Math.floor(Math.random() * bookQuotes.length)];
            document.getElementById('bookEn').textContent = `"${b.en}"`;
            document.getElementById('bookFa').textContent = b.fa;
            document.getElementById('bookAuthor').textContent = `— ${b.author}`;
        }
        updateQuotes(); setInterval(updateQuotes, 7200000);

        // پومودورو
        const pomoModal = document.getElementById('pomodorroModal');
        const timerDisplay = document.getElementById('timerDisplay');
        const ringFill = document.getElementById('ringFill');
        const startPom = document.getElementById('startPom');
        const resetPom = document.getElementById('resetPom');
        const CIRC = 2 * Math.PI * 100;
        ringFill.style.strokeDasharray = '6 10'; ringFill.style.strokeDashoffset = '0';
        let pomoSec = 1500, pomoInterval = null, pomoRunning = false;
        function updatePomUI() {
            const m = Math.floor(pomoSec / 60), s = pomoSec % 60;
            timerDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            ringFill.style.strokeDashoffset = CIRC * (1 - pomoSec / 1500);
        }
        function startPomodorro() {
            if (pomoRunning) return; pomoRunning = true; startPom.textContent = 'توقف';
            pomoInterval = setInterval(() => {
                if (pomoSec <= 0) { clearInterval(pomoInterval); pomoRunning = false; startPom.textContent = 'شروع'; alert('🍅 زمان استراحت!'); pomoSec = 1500; updatePomUI(); }
                else { pomoSec--; updatePomUI(); }
            }, 1000);
        }
        function resetPomodorro() { clearInterval(pomoInterval); pomoRunning = false; startPom.textContent = 'شروع'; pomoSec = 1500; updatePomUI(); }
        startPom.addEventListener('click', () => { if (pomoRunning) resetPomodorro(); else startPomodorro(); });
        resetPom.addEventListener('click', resetPomodorro);
        document.getElementById('pomodorroFloatBtn').addEventListener('click', () => pomoModal.classList.add('active'));
        document.getElementById('closePom').addEventListener('click', () => pomoModal.classList.remove('active'));
        window.addEventListener('click', e => { if (e.target === pomoModal) pomoModal.classList.remove('active'); });
        updatePomUI();

        // ========== ایجاد ابر و ستاره‌های پس‌زمینه ==========
        function createBackgroundEffects() {
            const sky = document.getElementById('skyBg');
            // ستاره‌های پنج‌پر
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 4 + 2;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                sky.appendChild(star);
            }
            // ابرهای سفید
            for (let i = 0; i < 10; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                const size = Math.random() * 80 + 60;
                cloud.style.width = size + 'px';
                cloud.style.height = size * 0.5 + 'px';
                cloud.style.top = Math.random() * 80 + '%';
                cloud.style.left = -size + 'px';
                cloud.style.animationDuration = (Math.random() * 20 + 15) + 's';
                cloud.style.animationDelay = Math.random() * 10 + 's';
                sky.appendChild(cloud);
            }
        }
        window.addEventListener('load', createBackgroundEffects);
    </script>
</body>
</html>
